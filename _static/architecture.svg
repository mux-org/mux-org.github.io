<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 454" role="img">
<title>Mux architecture diagram</title>
<desc>Mux containerized architecture: web and script clients connect over HTTP, WebSocket, and WebRTC to a group of mux containers providing generic capabilities, which run on a dedicated or shared host and connect to instrument hardware and other computers.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t { font-family: var(--font-sans, sans-serif); font-size: 14px; fill: var(--color-text-primary, #2C2C2A); }
.ts { font-family: var(--font-sans, sans-serif); font-size: 12px; fill: var(--color-text-secondary, #5F5E5A); }
.th { font-family: var(--font-sans, sans-serif); font-size: 14px; font-weight: 500; fill: var(--color-text-primary, #2C2C2A); }
.arr { stroke: var(--color-text-secondary, #5F5E5A); stroke-width: 1; fill: none; }
</style>
</defs>

<text class="th" x="40" y="30">Clients</text>
<g>
<rect x="40" y="40" width="290" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="185" y="66" text-anchor="middle" fill="#3C3489">Browser UI</text>
<text class="ts" x="185" y="84" text-anchor="middle" fill="#534AB7">bundled components or your own</text>
</g>
<g>
<rect x="350" y="40" width="290" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="495" y="66" text-anchor="middle" fill="#3C3489">Services / scripts</text>
<text class="ts" x="495" y="84" text-anchor="middle" fill="#534AB7">headless clients, integrations</text>
</g>

<text class="ts" x="150" y="116" text-anchor="middle">HTTP</text>
<line x1="150" y1="122" x2="150" y2="148" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="116" text-anchor="middle">WebSocket</text>
<line x1="340" y1="122" x2="340" y2="148" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text class="ts" x="530" y="116" text-anchor="middle">WebRTC</text>
<line x1="530" y1="122" x2="530" y2="148" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<rect x="32" y="150" width="616" height="170" rx="14" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="48" y="172">mux containers</text>

<g>
<rect x="44" y="182" width="139" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="113" y="210" text-anchor="middle" fill="#0C447C">Command API</text>
<text class="ts" x="113" y="228" text-anchor="middle" fill="#185FA5">commands &amp; data</text>
</g>
<g>
<rect x="195" y="182" width="139" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="264" y="210" text-anchor="middle" fill="#0C447C">Telemetry</text>
<text class="ts" x="264" y="228" text-anchor="middle" fill="#185FA5">status &amp; events</text>
</g>
<g>
<rect x="346" y="182" width="139" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="415" y="210" text-anchor="middle" fill="#0C447C">Video</text>
<text class="ts" x="415" y="228" text-anchor="middle" fill="#185FA5">live streaming</text>
</g>
<g>
<rect x="497" y="182" width="139" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="566" y="210" text-anchor="middle" fill="#0C447C">Recording</text>
<text class="ts" x="566" y="228" text-anchor="middle" fill="#185FA5">capture to disk</text>
</g>

<rect x="44" y="250" width="592" height="32" rx="8" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="340" y="270" text-anchor="middle" fill="#185FA5">+ instrument-specific containers</text>

<text class="ts" x="340" y="306" text-anchor="middle">containers run on a dedicated server, or share a machine with other instrument software</text>

<line x1="150" y1="324" x2="150" y2="350" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text class="ts" x="150" y="366" text-anchor="middle">USB</text>
<line x1="277" y1="324" x2="277" y2="350" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text class="ts" x="277" y="366" text-anchor="middle">serial</text>
<line x1="403" y1="324" x2="403" y2="350" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text class="ts" x="403" y="366" text-anchor="middle">Ethernet</text>
<line x1="530" y1="324" x2="530" y2="350" class="arr" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text class="ts" x="530" y="366" text-anchor="middle">shared memory</text>

<g>
<rect x="40" y="380" width="300" height="54" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="190" y="407" text-anchor="middle" fill="#444441">Instrument hardware</text>
<text class="ts" x="190" y="425" text-anchor="middle" fill="#444441">cameras, mechanisms, &#8230;</text>
</g>
<g>
<rect x="360" y="380" width="280" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="500" y="407" text-anchor="middle" fill="#712B13">Computers &amp; servers</text>
<text class="ts" x="500" y="425" text-anchor="middle" fill="#993C1D">AO loop, other instruments, telescope control</text>
</g>
</svg>
