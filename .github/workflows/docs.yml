# Simple workflow for deploying static content to GitHub Pages
name: Build and publish docs

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Clone documentation repositories
        env:
          # PAT or GitHub App token with read access to any private repos.
          # Falls back to GITHUB_TOKEN, which is fine for public repos.
          MUX_DOCS_TOKEN: ${{ secrets.MUX_DOCS_TOKEN || github.token }}
        run: |
          for list in */repos.txt; do
            [ -e "$list" ] || continue
            dest="${list%/repos.txt}"
            while read -r repo branch _; do
              case "$repo" in ''|\#*) continue ;; esac
              name="${repo##*/}"
              echo "Cloning $repo into $dest/$name"
              git clone --depth 1 ${branch:+--branch "$branch"} \
                "https://x-access-token:${MUX_DOCS_TOKEN}@github.com/${repo}.git" \
                "$dest/$name"
            done < "$list"
          done
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      - name: Build
        run: |
          make clean && make html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
